name: Build slides

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Create output directory
        run: mkdir -p dist

      - name: Build HTML
        run: npx @marp-team/marp-cli@latest slide-deck.md --theme ./custom.css

      - name: Build PDF
        run: npx @marp-team/marp-cli@latest slide-deck.md --theme ./custom.css --allow-local-files -o dist/slide-deck.pdf

      - name: Show build output
        run: ls -lah dist

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v6
        with:
          name: slide-html
          path: dist/slide-deck.html

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: slide-pdf
          path: dist/slide-deck.pdf